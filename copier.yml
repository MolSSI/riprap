_min_copier_version: "9"
_subdirectory: template
_skip_if_exists:
  - /README.md
  - /Containerfile
  - /CLAUDE.md
  - /.claude/skills/*/local.md
  - /LICENSE
  # Package/crate skeletons: seeded once, owned by the user thereafter
  - /pyproject.toml
  - /Cargo.toml
  - /src/**
  - /tests/**
  - /.github/workflows/CI.yaml
  - /.codecov.yml
  # GitHub prose files: seeded once, owned by the user thereafter.
  # Note: .github/workflows/codeql.yaml is deliberately NOT listed here —
  # it is template-owned and receives updates via `copier update`.
  - /.github/CONTRIBUTING.md
  - /.github/PULL_REQUEST_TEMPLATE.md
  - /CODE_OF_CONDUCT.md
  # Documentation skeleton: seeded once, owned by the user thereafter
  - /docs/**
  - /.readthedocs.yaml
  # Development tooling: seeded once, owned by the user thereafter
  - /devtools/**

# ---------------------------------------------------------------------------
# Project identity
# ---------------------------------------------------------------------------

project_name:
  type: str
  help: Human-readable name of your project (e.g. "My Project")

project_slug:
  type: str
  help: Short identifier used in image names, directory names, etc.
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

project_description:
  type: str
  help: One-sentence description of what your project does

# ---------------------------------------------------------------------------
# Language
# ---------------------------------------------------------------------------

language:
  type: str
  choices:
    - rust
    - python
  default: rust
  help: Primary programming language for this project

# ---------------------------------------------------------------------------
# Rust crate skeleton
# ---------------------------------------------------------------------------

include_rust_skeleton:
  type: bool
  help: >-
    Create skeletal Rust crate files (Cargo.toml, src/, tests/, CI workflow)?
    Answer no when adding Guardrails to an existing Rust project.
  default: true
  when: "{{ language == 'rust' }}"

# ---------------------------------------------------------------------------
# Python package skeleton (adapted from the MolSSI CMS Cookiecutter,
# https://github.com/MolSSI/cookiecutter-cms)
# ---------------------------------------------------------------------------

package_name:
  type: str
  help: Python import name of the package (the directory under src/)
  default: "{{ project_slug | replace('-', '_') }}"
  when: "{{ language == 'python' }}"

include_python_skeleton:
  type: bool
  help: >-
    Create skeletal Python package files (pyproject.toml, src/, tests/)?
    Answer no when adding Guardrails to an existing Python package.
  default: true
  when: "{{ language == 'python' }}"

first_module_name:
  type: str
  help: Name of the first module to create inside the package
  default: "{{ package_name }}"
  when: "{{ language == 'python' and include_python_skeleton }}"

include_docs:
  type: bool
  help: >-
    Create a Sphinx documentation skeleton (docs/) with a ReadTheDocs
    configuration?
  default: true
  when: "{{ language == 'python' }}"

dependency_source:
  type: str
  help: Where should project dependencies come from?
  choices:
    - Prefer conda-forge with pip fallback
    - Prefer default anaconda channel with pip fallback
    - Dependencies from pip only (no conda)
  default: Prefer conda-forge with pip fallback
  when: "{{ language == 'python' }}"

# Derived, never asked: single flags used to switch template paths on and off.
create_python_skeleton:
  type: bool
  default: "{{ language == 'python' and include_python_skeleton }}"
  when: false

create_rust_skeleton:
  type: bool
  default: "{{ language == 'rust' and include_rust_skeleton }}"
  when: false

create_skeleton:
  type: bool
  default: "{{ create_python_skeleton or create_rust_skeleton }}"
  when: false

create_docs:
  type: bool
  default: "{{ language == 'python' and include_docs }}"
  when: false

use_conda:
  type: bool
  default: "{{ language == 'python' and dependency_source != 'Dependencies from pip only (no conda)' }}"
  when: false

# ---------------------------------------------------------------------------
# Author
# ---------------------------------------------------------------------------

author_name:
  type: str
  help: Your full name

author_email:
  type: str
  help: Your email address

# ---------------------------------------------------------------------------
# License (choices adapted from the MolSSI CMS Cookiecutter)
# ---------------------------------------------------------------------------

open_source_license:
  type: str
  help: Software license for this project
  choices:
    - MIT
    - BSD-3-Clause
    - LGPL-3.0-or-later
    - Not Open Source
  default: MIT

# Copier has no built-in access to the current date, so the year is a question.
# Bump the default when a new year rolls around.
copyright_year:
  type: str
  help: Copyright year for the LICENSE file
  default: "2026"
  when: "{{ open_source_license != 'Not Open Source' }}"

# Derived, never asked: whether to generate a LICENSE file.
create_license:
  type: bool
  default: "{{ open_source_license != 'Not Open Source' }}"
  when: false
