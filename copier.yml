_min_copier_version: "9"
_subdirectory: template
_skip_if_exists:
  - /README.md
  - /Containerfile
  - /CLAUDE.md
  - /.claude/skills/*/local.md
  # Python package skeleton: seeded once, owned by the user thereafter
  - /pyproject.toml
  - /src/**
  - /tests/**

# ---------------------------------------------------------------------------
# Project identity
# ---------------------------------------------------------------------------

project_name:
  type: str
  help: Human-readable name of your project (e.g. "My Project")

project_slug:
  type: str
  help: Short identifier used in image names, directory names, etc.
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

project_description:
  type: str
  help: One-sentence description of what your project does

# ---------------------------------------------------------------------------
# Language
# ---------------------------------------------------------------------------

language:
  type: str
  choices:
    - rust
    - python
  default: rust
  help: Primary programming language for this project

# ---------------------------------------------------------------------------
# Python package skeleton (adapted from the MolSSI CMS Cookiecutter,
# https://github.com/MolSSI/cookiecutter-cms)
# ---------------------------------------------------------------------------

package_name:
  type: str
  help: Python import name of the package (the directory under src/)
  default: "{{ project_slug | replace('-', '_') }}"
  when: "{{ language == 'python' }}"

include_python_skeleton:
  type: bool
  help: >-
    Create skeletal Python package files (pyproject.toml, src/, tests/)?
    Answer no when adding Guardrails to an existing Python package.
  default: true
  when: "{{ language == 'python' }}"

first_module_name:
  type: str
  help: Name of the first module to create inside the package
  default: "{{ package_name }}"
  when: "{{ language == 'python' and include_python_skeleton }}"

# Derived, never asked: single flag used to switch skeleton paths on and off.
create_skeleton:
  type: bool
  default: "{{ language == 'python' and include_python_skeleton }}"
  when: false

# ---------------------------------------------------------------------------
# Author
# ---------------------------------------------------------------------------

author_name:
  type: str
  help: Your full name

author_email:
  type: str
  help: Your email address
