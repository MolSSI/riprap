name: Test Riprap

# rq-b4c43b87 rq-0da67b01 rq-f5edc2ae
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes pipx podman
          pipx install 'copier>=9,<10'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Test template rendering and updates
        run: bash tests/test_agent_neutral_skills.sh

      - name: Test template ownership layout
        run: bash tests/check_template_ownership.sh

      - name: Test agent permission defaults
        run: bash tests/test_agent_permissions.sh

      - name: Test generated project variants
        run: bash tests/test_generated_project_variants.sh

      - name: Test repository CI event policy
        run: bash tests/test_repository_ci.sh

      - name: Test requirements tooling
        run: bash template/.riprap/managed/skills/rr-plan/tests/test_rqm.sh

      - name: Validate template traceability boundary
        run: bash tests/check_template_traceability.sh

      - name: Test generated development containers
        run: bash tests/test_development_container.sh

      - name: Test credential isolation and traceability boundary
        run: bash tests/test_credential_isolation.sh

  # Launch orchestration is validated against a mock container runtime, so this job needs no
  # container runtime, virtualization, or Linux subsystem. Windows launch behavior is written
  # in a separate language from the shell path and cannot be inferred from the Linux job.
  windows-launcher:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install test dependencies
        shell: powershell
        run: |
          pipx install 'copier>=9,<10'
          "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test the Windows launch path
        shell: powershell
        run: .\tests\test_windows_launcher.ps1
